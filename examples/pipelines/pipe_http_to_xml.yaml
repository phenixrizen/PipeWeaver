pipeline:
  id: pipe_http_to_xml
  name: Eligibility events pipe to XML
  description: Turn a pipe-delimited eligibility feed into XML event records for downstream acknowledgment.
source:
  type: http
  format: pipe
  config:
    samplePayload: |
      event_id|region|member_name|plan_code|status
      EVT-1|NA| Ada Lovelace |GOLD|approved
      EVT-2|EU|Grace Hopper|PLUS|pending_review
target:
  type: stdout
  format: xml
  config:
    sampleOutput: |
      <records>
        <record>
          <event_id>EVT-1</event_id>
          <region>NA</region>
          <member_name>Ada Lovelace</member_name>
          <plan_code>GOLD</plan_code>
          <status>APPROVED</status>
        </record>
      </records>
mapping:
  fields:
    - from: event_id
      to: event_id
    - from: region
      to: region
      transforms:
        - type: upper
    - from: member_name
      to: member_name
      transforms:
        - type: trim
    - from: plan_code
      to: plan_code
      transforms:
        - type: upper
    - from: status
      to: status
      transforms:
        - type: replace
          values:
            - "_"
            - " "
