pipeline:
  id: csv_http_to_json_cel
  name: Member roster CSV to JSON with CEL
  description: Use CEL expressions to compose member-facing JSON fields from incoming roster rows.
source:
  type: http
  format: csv
  config:
    samplePayload: |
      first_name,last_name,preferred_name,member_id,plan_code,effective_date
      Ada,Lovelace,,M-1001,GOLD,2026-04-01
      Grace,Hopper,Amazing Grace,M-1002,PLUS,2026-04-15
target:
  type: stdout
  format: json
  config:
    sampleOutput: |
      {
        "member": {
          "id": "M-1001",
          "full_name": "Ada Lovelace",
          "display_name": "Ada",
          "enrollment_key": "M-1001:GOLD"
        },
        "coverage": {
          "plan_code": "GOLD",
          "effective_date": "2026-04-01"
        }
      }
mapping:
  fields:
    - expression: 'record.first_name + " " + record.last_name'
      to: member.full_name
    - expression: 'preferred_name != "" ? preferred_name : first_name'
      to: member.display_name
    - expression: 'member_id + ":" + plan_code'
      to: member.enrollment_key
    - from: member_id
      to: member.id
    - from: plan_code
      to: coverage.plan_code
      transforms:
        - type: upper
    - from: effective_date
      to: coverage.effective_date
targetSchema:
  type: object
  fields:
    - name: member
      type: object
      required: true
      fields:
        - name: id
          type: string
          required: true
        - name: full_name
          type: string
          required: true
        - name: display_name
          type: string
          required: true
        - name: enrollment_key
          type: string
          required: true
    - name: coverage
      type: object
      required: true
      fields:
        - name: plan_code
          type: string
          required: true
        - name: effective_date
          type: string
          required: true
