pipeline:
  id: csv_http_to_json
  name: CSV HTTP to JSON
  description: Transform posted CSV rows into structured JSON.
source:
  type: http
  format: csv
  config:
    samplePayload: |
      customer_id,full_name,amount
      1001, Ada Lovelace ,12.50
      1002,Grace Hopper,41.75
target:
  type: stdout
  format: json
mapping:
  fields:
    - from: customer_id
      to: customer.id
      transforms:
        - type: trim
    - from: full_name
      to: customer.name
      transforms:
        - type: trim
    - expression: 'customer_id + ":" + full_name'
      to: customer.display
      transforms:
        - type: trim
    - from: amount
      to: invoice.amount
      transforms:
        - type: to_float
    - to: invoice.currency
      transforms:
        - type: default
          value: USD
targetSchema:
  type: object
  fields:
    - name: customer
      type: object
      required: true
      fields:
        - name: id
          type: string
          required: true
        - name: name
          type: string
          required: true
        - name: display
          type: string
          required: true
    - name: invoice
      type: object
      required: true
      fields:
        - name: amount
          type: number
          required: true
        - name: currency
          type: string
          required: true
