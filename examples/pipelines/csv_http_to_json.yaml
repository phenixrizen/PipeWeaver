pipeline:
  id: csv_http_to_json
  name: Billing intake CSV to JSON
  description: Turn posted billing rows into a structured JSON response for downstream order handling.
source:
  type: http
  format: csv
  config:
    samplePayload: |
      invoice_id,customer_id,customer_name,service_date,amount,currency
      INV-1001,C-1001, Ada Lovelace ,2026-03-18,12.50,USD
      INV-1002,C-1002,Grace Hopper,2026-03-19,41.75,USD
target:
  type: stdout
  format: json
  config:
    sampleOutput: |
      {
        "customer": {
          "id": "C-1001",
          "name": "Ada Lovelace"
        },
        "invoice": {
          "id": "INV-1001",
          "service_date": "2026-03-18",
          "amount": 12.5,
          "currency": "USD"
        }
      }
mapping:
  fields:
    - from: customer_id
      to: customer.id
      transforms:
        - type: trim
    - from: customer_name
      to: customer.name
      transforms:
        - type: trim
    - from: invoice_id
      to: invoice.id
      transforms:
        - type: trim
    - from: service_date
      to: invoice.service_date
    - from: amount
      to: invoice.amount
      transforms:
        - type: to_float
    - from: currency
      to: invoice.currency
      transforms:
        - type: upper
targetSchema:
  type: object
  fields:
    - name: customer
      type: object
      required: true
      fields:
        - name: id
          type: string
          required: true
        - name: name
          type: string
          required: true
    - name: invoice
      type: object
      required: true
      fields:
        - name: id
          type: string
          required: true
        - name: service_date
          type: string
          required: true
        - name: amount
          type: number
          required: true
        - name: currency
          type: string
          required: true
