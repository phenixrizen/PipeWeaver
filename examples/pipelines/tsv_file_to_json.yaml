pipeline:
  id: tsv_file_to_json
  name: Warehouse shipment TSV to JSON
  description: Convert tab-delimited shipment exports into nested JSON with normalized casing for API consumers.
source:
  type: file
  format: tsv
  config:
    path: examples/inputs/shipments.tsv
    samplePayload: |
      shipment_id	warehouse	status	priority
      S-100	East	ready	high
      S-101	West	packed	medium
target:
  type: stdout
  format: json
  config:
    sampleOutput: |
      {
        "shipment": {
          "id": "S-100",
          "location": "east",
          "status": "READY",
          "priority": "high"
        }
      }
mapping:
  fields:
    - from: shipment_id
      to: shipment.id
    - from: warehouse
      to: shipment.location
      transforms:
        - type: lower
    - from: status
      to: shipment.status
      transforms:
        - type: upper
    - from: priority
      to: shipment.priority
      transforms:
        - type: default
          value: standard
targetSchema:
  type: object
  fields:
    - name: shipment
      type: object
      required: true
      fields:
        - name: id
          type: string
          required: true
        - name: location
          type: string
          required: true
        - name: status
          type: string
          required: true
        - name: priority
          type: string
          required: true
