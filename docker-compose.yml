version: '3.9'
services:
  pipeweaver-api:
    image: golang:1.22
    working_dir: /app
    volumes:
      - .:/app
    command: go run ./cmd/pipeweaver-api
    ports:
      - '8080:8080'
  pipeweaver-web:
    image: node:20
    working_dir: /app/web
    volumes:
      - .:/app
    command: sh -lc 'npm install && npm run dev -- --host 0.0.0.0'
    ports:
      - '5173:5173'
